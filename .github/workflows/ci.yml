name: CI

on:
  push:
    branches-ignore:
      - 'renovate/**'
    paths-ignore:
      - '**/*.md'
  pull_request:
    branches: [master]
    paths-ignore:
      - '**/*.md'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          # Keep in sync with java_version in gradle.properties
          java-version: 21
          distribution: temurin
      - uses: gradle/actions/setup-gradle@v6

      - name: Build & test
        run: ./gradlew build test

      - name: Smoke test (start server)
        run: |
          echo "eula=true" > run/eula.txt
          # timeout 124 = server survived 90s → mod loads OK
          # any other exit code = server crashed during init → FAIL
          timeout 90 ./gradlew runServer --args="nogui" 2>&1 || [ $? -eq 124 ]
