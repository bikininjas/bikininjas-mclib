name: Download core-lib
# Reusable workflow for child mods to fetch core-lib from GitHub Release.
# Call BEFORE `./gradlew build` in your child mod's CI.
#
# Usage from child mod CI:
#   download-corelib:
#     uses: bikininjas/BikininjasMCMods/.github/workflows/download-corelib.yml@master
#     # version is optional — defaults to latest release if omitted
#     with:
#       version: '1.0.0'   # or omit for auto-latest

on:
  workflow_call:
    inputs:
      version:
        required: false
        type: string
        default: 'latest'
        description: 'core-lib version (e.g. 1.0.0). Omit or use "latest" for auto-resolve.'
      repo:
        required: false
        type: string
        default: 'bikininjas/bikininjas-mclib'
        description: 'GitHub repo owning the release'

jobs:
  download:
    name: Download core-lib
    runs-on: ubuntu-latest
    steps:
      - name: Resolve version
        id: resolve
        run: |
          VERSION="${{ inputs.version }}"
          if [ "$VERSION" = "latest" ]; then
            echo "🔍 Resolving latest core-lib release from ${{ inputs.repo }}..."
            VERSION=$(curl -sSf \
              "https://api.github.com/repos/${{ inputs.repo }}/releases/latest" \
              | jq -r .tag_name | sed 's/^v//')
            echo "✅ Resolved: v${VERSION}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Download JAR from GitHub Release
        run: |
          VERSION="${{ steps.resolve.outputs.version }}"
          mkdir -p libs
          URL="https://github.com/${{ inputs.repo }}/releases/download/v${VERSION}/core_lib-${VERSION}.jar"
          curl -sSfL -o "libs/core_lib-${VERSION}.jar" "$URL"
          echo "✅ core-lib v${VERSION} downloaded ($(stat -c%s "libs/core_lib-${VERSION}.jar" 2>/dev/null || wc -c < "libs/core_lib-${VERSION}.jar") bytes)"
